name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y autoconf libtool pkg-config libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev automake zip unzip libltdl-dev
    
    - name: Install Buildozer
      run: pip install buildozer cython==0.29.36
    
    - name: Build APK
      run: buildozer android debug 2>&1 | tee build.log
    
    - name: Show error log
      if: failure()
      run: tail -n 300 build.log
    
    - uses: actions/upload-artifact@v4
      if: success()
      with:
        name: gala-game-apk
        path: bin/*.apk

name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install buildozer==1.5.1 "cython<3.0"
        
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf libtool pkg-config \
          libncurses5-dev libncursesw5-dev \
          libtinfo-dev cmake libffi-dev \
          libssl-dev automake \
          zip unzip \
          libltdl-dev libbz2-dev \
          libreadline-dev libsqlite3-dev \
          liblzma-dev zlib1g-dev
          
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          .buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Build APK
      run: |
        echo "y" | buildozer android debug 2>&1 | tee build.log
        
    - name: Check APK exists
      run: |
        if [ ! -f bin/*.apk ]; then
          echo "ERROR: APK not found!"
          echo "Last 200 lines of build log:"
          tail -n 200 build.log
          exit 1
        fi
        echo "APK built successfully:"
        ls -la bin/*.apk
        
    - name: Show last 500 lines on failure
      if: failure()
      run: tail -n 500 build.log
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: gala-game-apk
        path: bin/*.apk
        retention-days: 30

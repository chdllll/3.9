[app]
title = 旮旯GAME
package.name = gala_game
package.domain = org.gala
source.dir = .
source.include_exts = py,png,jpg,jpeg,gif,bmp,kv,atlas,db,json,ttf,otf,txt
source.exclude_exts = spec,pyc,pyo,md
version = 1.0.0
requirements = python3,kivy,pillow,aiohttp,pyjnius
orientation = portrait
fullscreen = 0

android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE,CAMERA,VIBRATE
android.api = 33
android.minapi = 21
android.accept_sdk_license = True

[buildozer]
log_level = 2
warn_on_root = 1
